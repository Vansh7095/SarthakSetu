kind = "web"
previewPath = "/"
title = "AnnSetu"
version = "1.0.0"
id = "artifacts/annsetu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21683

[services.development]
run = "pnpm --filter @workspace/annsetu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/annsetu", "run", "build" ]
publicDir = "artifacts/annsetu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21683"
BASE_PATH = "/"
